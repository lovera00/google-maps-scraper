# === Rate Limiting ===
rate_limit:
  request_delay_seconds: 3
  max_retries: 3
  retry_backoff_base: 2
  max_scroll_iterations: 50

# === Deduplicacion ===
dedup:
  proximity_threshold_meters: 50
  batch_size: 100
  use_spatial_hash: true

# === Storage ===
storage:
  batch_size: 50
  update_existing: true

# === Proxies ===
proxies:
  enabled: false
  source: "file"
  file_path: "data/proxies.txt"
  rotation_strategy: "round_robin"
  max_failures: 3
  cooldown_minutes: 10
  health_check_url: "https://www.google.com"

# === Logging ===
logging:
  level: "INFO"
  file: "logs/scraper.log"
  max_file_size_mb: 50
  backup_count: 5
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# === Mock/Test ===
mock:
  html_directory: "mocks/google_maps"
  simulate_delay: true
  mock_delay_seconds: 0.3

# === OSM ===
osm:
  data_dir: "data/osm"
  download_url: "https://download.geofabrik.de/south-america/paraguay-latest.osm.pbf"
  download_retries: 3
  download_backoff: 2.0
  frente_avenida_threshold_m: 120.0
  cerca_agua_threshold_m: 400.0
  h3_resolution: 9

