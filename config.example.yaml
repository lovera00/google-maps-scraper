# Sistema Multi-Agente de Scraping de Google Maps para Paraguay
# ============================================================

# === Modo de ejecucion ===
test_mode: false
headless: true
workers: 2

# === Base de datos ===
database:
  path: "data/paraguay_businesses.db"
  wal_mode: true

# === PostgreSQL (persistencia final) ===
# La DSN se lee de la variable de entorno PG_DSN.
# Setearla antes de ejecutar: export PG_DSN="postgresql://user:pass@host:port/db"
postgres:
  enabled: false
  dsn: ""

# === Grid del Query Planner ===
grid:
  initial_size_km: 5.0
  max_depth: 5
  bounding_box:
    lat_min: -27.6
    lat_max: -19.3
    lng_min: -62.6
    lng_max: -54.3

